; Funbox OS v1.0 — PlatformIO build config
; Target: ESP-WROOM-32S v1.1

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor
monitor_speed  = 115200
upload_speed   = 921600

; LittleFS filesystem image (drag-and-drop samples)
board_build.filesystem = littlefs

; Library dependencies
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.14.5

; Extra build flags — enable Bluetooth
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
